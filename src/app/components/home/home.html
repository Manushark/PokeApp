<div class="dashboard-wrapper">
  <!-- Cabecera de Luces de la Pokédex Física -->
  <div class="pokedex-top-bar">
    <div class="pokedex-lens-container">
      <div class="pokedex-lens"></div>
    </div>
    <div class="pokedex-lights">
      <div class="pokedex-light light-red"></div>
      <div class="pokedex-light light-yellow"></div>
      <div class="pokedex-light light-green"></div>
    </div>
    
    <!-- Alternador de Tema Integrado en la Pokédex Física -->
    <button class="topbar-theme-toggle" (click)="themeService.toggleTheme()" [attr.aria-label]="themeService.isDarkTheme() ? 'Cambiar a Modo Claro' : 'Cambiar a Modo Oscuro'" [title]="themeService.isDarkTheme() ? 'Cambiar a Modo Claro' : 'Cambiar a Modo Oscuro'">
      @if (themeService.isDarkTheme()) {
        <!-- Icono de Sol (Modo Claro) -->
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-57 96 101-52 53Zm548 492-97-101 53-52 101 96-57 57Zm-98-488 97 101-57 57-101-97 61-61ZM154-158l97-101 52 53-101 96-48-48Z"/></svg>
      } @else {
        <!-- Icono de Luna (Modo Oscuro) -->
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T440-660q0 85 54 147.5T627-432q-6 38-3.5 73.5T638-292q-37 38-86 65t-102 27Zm0-80q56 0 103.5-22.5T665-288q-36-19-61.5-51.5T568-408q-15-77 14.5-144T664-666q-25-14-53-20.5t-59-6.5q-117 0-198.5 81.5T272-412.5q0 117 81.5 198.5T480-200Zm-8-272Z"/></svg>
      }
    </button>
  </div>
  
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="mini-pokeball"></div>
        <h2>PokéApp</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a 
          routerLink="/home/random" 
          routerLinkActive="active" 
          class="nav-item">
          <span class="label">Pokémon Aleatorio</span>
        </a>
        <a 
          routerLink="/home/types" 
          routerLinkActive="active" 
          class="nav-item">
          <span class="label">Listar Tipos</span>
        </a>
        <a 
          routerLink="/home/search" 
          routerLinkActive="active" 
          class="nav-item">
          <span class="label">Buscar Pokémon</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a routerLink="/config" class="config-link">
          <span class="label">Configuración</span>
        </a>
      </div>
    </aside>
    
    <!-- Main content area -->
    <main class="main-content">
      <div class="main-glass-panel">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
